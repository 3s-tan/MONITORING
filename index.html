<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Machine Utilization Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>🖥️ Machine Utilization Tracker</h1>
      <p class="subtitle">Weekly Goal: <strong>60 hours</strong></p>
    </header>

    <!-- Progress Section -->
    <section class="progress-section">
      <div class="stats">
        <div class="stat-card">
          <p class="label">Total Hours</p>
          <h2 id="totalHours">0</h2>
        </div>
        <div class="stat-card">
          <p class="label">Remaining</p>
          <h2 id="remainingHours">60</h2>
        </div>
        <div class="stat-card">
          <p class="label">Status</p>
          <h2 id="status">⏳ In Progress</h2>
        </div>
      </div>

      <div class="progress-bar-container">
        <div id="progressBar" class="progress-bar"></div>
      </div>
      <p id="progressText" class="progress-text">0% of weekly goal</p>
    </section>

    <!-- Weekly Log — grouped per day -->
    <section class="log-section">
      <h2>📋 This Week's Log</h2>
      <div id="weekContainer">
        <!-- JavaScript will generate the day cards here -->
      </div>
    </section>

    <footer>
      <p>Last updated: <span id="lastUpdated">--</span></p>
      <p><strong>Tristan Nico Ligon AND Devie Rosel</strong></p>
    </footer>
  </div>

  <!-- Modal for Adding Entry -->
  <div id="addModal" class="modal hidden">
    <div class="modal-content">
      <h3 id="modalTitle">Add Entry</h3>
      <label>
        Board
        <select id="entryBoard">
          <option value="">-- Select Board --</option>
          <option value="Riderboard">Riderboard</option>
          <option value="Powerboard">Powerboard</option>
          <option value="Controlboard">Controlboard</option>
          <option value="Testboard">Testboard</option>
          <option value="Other">Other</option>
        </select>
      </label>
      <label>
        Activity
        <select id="entryActivity">
          <option value="Program Development">Program Development</option>
          <option value="Board Repair">Board Repair</option>
          <option value="Debugging">Debugging</option>
          <option value="Testing">Testing</option>
          <option value="QuickTest Dev">QuickTest Dev</option>
          <option value="Other">Other</option>
        </select>
      </label>
      <label>
        Hours
        <input type="number" id="entryHours" min="0" step="0.5" placeholder="e.g. 2.5" />
      </label>
      <label>
        Notes (optional)
        <input type="text" id="entryNotes" placeholder="Additional details..." />
      </label>

      <div class="modal-actions">
        <button id="cancelBtn" class="btn-secondary">Cancel</button>
        <button id="saveBtn" class="btn-primary">Save Entry</button>
      </div>

      <div id="codeOutput" class="code-output hidden">
        <p class="code-label">✅ Copy this line into <code>weeklyLog</code> in <code>script.js</code>:</p>
        <pre id="codeSnippet"></pre>
        <button id="copyBtn" class="btn-secondary">📄 Copy to Clipboard</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
